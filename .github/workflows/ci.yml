name: Lean CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install elan
        run: curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain leanprover/lean4:v4.29.0-rc4
      - name: Add elan to PATH
        run: echo "$HOME/.elan/bin" >> $GITHUB_PATH
      - name: Cache Mathlib
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake
          key: ${{ runner.os }}-lake-${{ hashFiles('lakefile.lean') }}
      - name: Get Mathlib cache
        run: lake exe cache get
      - name: Build
        run: lake build
